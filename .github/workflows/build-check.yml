# .github/workflows/build-check.yml
#
# Runs on every pull request to verify the Astro build succeeds
# before merging to main. Cloudflare Pages handles the actual deployment.
#
# This ensures a broken build never reaches production.

name: Build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Astro build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed — dist/ directory not found"
            exit 1
          fi
          echo "Build succeeded — dist/ contains $(ls dist | wc -l) items"
          ls -la dist/
